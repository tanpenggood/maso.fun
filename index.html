<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <title>✦ tanpenggood · 记录学习点滴 ✦</title>
    <meta name="keywords" content="tanpenggood,记录自己学习记录点滴,Java">
    <meta name="description" content="我怀着一份赤子之心">
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="format-detection" content="telephone=no">
    <link rel="icon" href="images/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 40%, #0f3460 70%, #533483 100%);
            font-family: 'Nunito', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        /* ── 浮动粒子 ── */
        .particles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.15);
            animation: floatParticle var(--dur) ease-in-out infinite alternate;
        }

        @keyframes floatParticle {
            0% {
                transform: translateY(0) scale(1);
                opacity: 0.3;
            }
            100% {
                transform: translateY(-30px) scale(1.3);
                opacity: 0.8;
            }
        }

        /* ── 流星 ── */
        .shooting-star {
            position: fixed;
            width: 120px;
            height: 2px;
            background: linear-gradient(to right, rgba(255, 255, 255, 0), #fff);
            border-radius: 1px;
            animation: shoot 4s ease-in-out infinite;
            top: 10%;
            left: 60%;
            transform: rotate(-35deg);
            opacity: 0;
            pointer-events: none;
            z-index: 0;
        }

        .shooting-star::after {
            content: '';
            position: absolute;
            right: 0;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: #fff;
            box-shadow: 0 0 6px #fff, 0 0 12px rgba(255, 255, 255, 0.5);
        }

        .shooting-star:nth-child(2) {
            top: 20%;
            left: 30%;
            animation-delay: 2.5s;
            width: 80px;
        }

        @keyframes shoot {
            0% {
                transform: rotate(-35deg) translateX(0);
                opacity: 0;
            }
            5% {
                opacity: 1;
            }
            20% {
                transform: rotate(-35deg) translateX(-400px);
                opacity: 0;
            }
            100% {
                opacity: 0;
            }
        }

        /* ── 容器 ── */
        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 680px;
            padding: 40px 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ── 头像 ── */
        .avatar-wrapper {
            position: relative;
            margin-bottom: 28px;
            animation: fadeInDown 0.8s ease both;
        }

        .avatar-ring {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            padding: 4px;
            background: linear-gradient(135deg, #f8a5c2, #a29bfe, #74b9ff, #fd79a8);
            background-size: 300% 300%;
            animation: ringShift 4s ease infinite;
            box-shadow: 0 0 30px rgba(162, 155, 254, 0.35), 0 0 60px rgba(248, 165, 194, 0.15);
        }

        @keyframes ringShift {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }

        .avatar-ring img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            display: block;
        }

        /* ── 名称 ── */
        .name {
            font-size: 2rem;
            font-weight: 800;
            color: #fff;
            text-shadow: 0 2px 12px rgba(0, 0, 0, 0.4);
            letter-spacing: 2px;
            margin-bottom: 6px;
            animation: fadeInDown 0.8s 0.15s ease both;
        }

        .name small {
            font-size: 1rem;
            font-weight: 400;
            opacity: 0.7;
        }

        .subtitle {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.6);
            letter-spacing: 4px;
            margin-bottom: 40px;
            animation: fadeInDown 0.8s 0.3s ease both;
        }

        /* ── 卡片 ── */
        .card-grid {
            display: flex;
            flex-direction: column;
            gap: 16px;
            width: 100%;
            animation: fadeInUp 0.8s 0.45s ease both;
        }

        .card {
            display: flex;
            align-items: center;
            gap: 18px;
            padding: 18px 24px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            text-decoration: none;
            color: #fff;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 16px;
            background: linear-gradient(135deg, rgba(248, 165, 194, 0.08), rgba(162, 155, 254, 0.08));
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .card:hover {
            transform: translateY(-3px);
            border-color: rgba(255, 255, 255, 0.18);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.25);
        }

        .card:hover::before {
            opacity: 1;
        }

        .card:active {
            transform: translateY(0) scale(0.98);
        }

        .card-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            flex-shrink: 0;
            position: relative;
            z-index: 1;
        }

        .card-icon.github {
            background: linear-gradient(135deg, #2d3436, #636e72);
        }

        .card-icon.note {
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
        }

        .card-icon.repo {
            background: linear-gradient(135deg, #00b894, #00cec9);
        }

        .card-body {
            flex: 1;
            min-width: 0;
            position: relative;
            z-index: 1;
        }

        .card-title {
            font-size: 1.05rem;
            font-weight: 700;
            margin-bottom: 2px;
        }

        .card-desc {
            font-size: 0.82rem;
            color: rgba(255, 255, 255, 0.55);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-arrow {
            font-size: 1.2rem;
            opacity: 0.3;
            transition: opacity 0.3s ease, transform 0.3s ease;
            position: relative;
            z-index: 1;
        }

        .card:hover .card-arrow {
            opacity: 0.7;
            transform: translateX(4px);
        }

        /* ── 装饰分隔 ── */
        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 28px 0 20px;
            color: rgba(255, 255, 255, 0.2);
            font-size: 0.85rem;
            animation: fadeIn 1s 0.7s ease both;
        }

        .divider-line {
            flex: 1;
            height: 1px;
            background: linear-gradient(to right, transparent, rgba(255, 255, 255, 0.15), transparent);
        }

        /* ── 项目列表标签 ── */
        .section-label {
            width: 100%;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.35);
            letter-spacing: 3px;
            margin-bottom: 8px;
            animation: fadeIn 1s 0.7s ease both;
        }

        /* ── 页脚 ── */
        .footer {
            margin-top: 36px;
            font-size: 0.78rem;
            color: rgba(255, 255, 255, 0.25);
            text-align: center;
            animation: fadeIn 1s 0.9s ease both;
        }

        .footer a {
            color: rgba(255, 255, 255, 0.35);
            text-decoration: none;
            transition: color 0.2s;
        }

        .footer a:hover {
            color: rgba(255, 255, 255, 0.7);
        }

        /* ── 动画关键帧 ── */
        @keyframes fadeInDown {
            0% {
                opacity: 0;
                transform: translateY(-20px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            0% {
                opacity: 0;
                transform: translateY(20px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            0% {
                opacity: 0;
            }
            100% {
                opacity: 1;
            }
        }

        /* ── 响应式 ── */
        @media (max-width: 480px) {
            .container {
                padding: 32px 16px;
            }

            .name {
                font-size: 1.5rem;
            }

            .avatar-ring {
                width: 100px;
                height: 100px;
            }

            .card {
                padding: 14px 16px;
                gap: 14px;
            }

            .card-icon {
                width: 38px;
                height: 38px;
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>

<!-- 背景粒子 -->
<div class="particles" id="particles"></div>
<div class="shooting-star"></div>
<div class="shooting-star"></div>

<div class="container">

    <!-- 头像 -->
    <div class="avatar-wrapper">
        <div class="avatar-ring">
            <img src="images/logo.png" alt="avatar">
        </div>
    </div>

    <!-- 名称 -->
    <div class="name">tanpenggood <small>· 记录学习点滴</small></div>
    <div class="subtitle">✦ 赤子之心 · 不负韶华 ✦</div>

    <!-- 主要卡片 -->
    <div class="card-grid" id="card-grid"></div>

    <!-- 分隔 -->
    <div class="divider">
        <span class="divider-line"></span>
        <span>❀</span>
        <span class="divider-line"></span>
    </div>

    <!-- 页脚 -->
    <div class="footer">
        <span id="period"></span>
        <span> · </span>
        <span><a href="https://beian.miit.gov.cn" target="_blank">蜀ICP备19019750号</a></span>
        <span> · </span>
        <span>Power by <a href="https://github.com/tanpenggood" target="_blank">tanpenggood</a></span>
    </div>

</div>

<script>
    // 背景粒子
    (function initParticles() {
        var c = document.getElementById('particles');
        for (var i = 0; i < 60; i++) {
            var p = document.createElement('div');
            p.className = 'particle';
            var s = 2 + Math.random() * 4;
            p.style.width = s + 'px';
            p.style.height = s + 'px';
            p.style.left = Math.random() * 100 + '%';
            p.style.top = Math.random() * 100 + '%';
            p.style.setProperty('--dur', (3 + Math.random() * 4) + 's');
            p.style.animationDelay = Math.random() * 4 + 's';
            c.appendChild(p);
        }
    })();

    // 卡片数据 & 渲染
    (function renderCards() {
        var cards = [
            {
                icon: '🐙',
                iconClass: 'github',
                title: 'GitHub',
                desc: 'github.com/tanpenggood · 我的开源之旅',
                href: 'https://github.com/tanpenggood'
            },
            {
                icon: '📓',
                iconClass: 'note',
                title: '学习笔记',
                desc: 'showdoc.maso.fun · 记录技术点滴',
                href: 'http://showdoc.maso.fun/'
            },
            {
                icon: '📦',
                iconClass: 'repo',
                title: 'jeecg-spring-boot-starter',
                desc: '基于 jeecg-boot 封装的 spring-boot-starter',
                href: 'https://github.com/tanpenggood/jeecg-spring-boot-starter'
            },
            {
                icon: '⚡',
                iconClass: 'repo',
                title: 'tp-practice',
                desc: '千里之行，始于足下 · 日常练习与实践',
                href: 'https://github.com/tanpenggood/tp-practice'
            },
            {
                icon: '🎮',
                iconClass: 'repo',
                title: 'hero-helper',
                desc: 'Hero (web game) helper · 游戏辅助工具',
                href: 'https://github.com/tanpenggood/hero-helper'
            },
        ];
        var grid = document.getElementById('card-grid');
        for (var i = 0; i < cards.length; i++) {
            var c = cards[i];
            var a = document.createElement('a');
            a.className = 'card';
            a.href = c.href;
            a.target = '_blank';
            a.rel = 'noopener';
            a.innerHTML =
                '<div class="card-icon ' + c.iconClass + '">' + c.icon + '</div>' +
                '<div class="card-body">' +
                '<div class="card-title">' + c.title + '</div>' +
                '<div class="card-desc">' + c.desc + '</div>' +
                '</div>' +
                '<div class="card-arrow">→</div>';
            grid.appendChild(a);
        }
    })();

    // 域名 & 版权年份
    var host = location.host;
    var parts = host.split('.');
    var domain = parts.slice(-2).join('.');
    var now = new Date();
    document.getElementById('period').textContent = domain + ' © 2017 - ' + now.getFullYear();
</script>
</body>
</html>
