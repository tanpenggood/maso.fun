<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>魔法镜 ✦ 动漫梳妆镜</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      overflow: hidden;
    }

    /* 星空粒子 */
    .stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .star {
      position: absolute;
      border-radius: 50%;
      background: #fff;
      animation: twinkle var(--d) ease-in-out infinite alternate;
    }
    @keyframes twinkle {
      0% { opacity: 0.2; transform: scale(0.8); }
      100% { opacity: 1; transform: scale(1.2); }
    }

    .container {
      position: relative;
      z-index: 1;
      width: 90vmin;
      max-width: 500px;
      aspect-ratio: 3 / 4;
    }

    /* 镜框 - 动漫风格 */
    .frame {
      position: relative;
      width: 100%;
      height: 100%;
      border-radius: 30px;
      padding: 12px;
      background: linear-gradient(145deg, #f8a5c2, #a29bfe, #74b9ff, #fd79a8);
      background-size: 300% 300%;
      animation: gradientShift 6s ease infinite;
      box-shadow:
        0 0 40px rgba(162, 155, 254, 0.4),
        0 0 80px rgba(248, 165, 194, 0.25),
        inset 0 0 20px rgba(255,255,255,0.15);
    }
    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .frame-inner {
      width: 100%;
      height: 100%;
      border-radius: 20px;
      overflow: hidden;
      position: relative;
      background: #000;
    }

    /* 镜面视频 —— 水平翻转实现镜子效果 */
    #mirror-video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
      display: block;
    }

    /* 镜面上的装饰贴纸 */
    .sticker {
      position: absolute;
      pointer-events: none;
      font-size: 2rem;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
      animation: floatSticker 3s ease-in-out infinite;
    }
    .sticker:nth-child(1) { top: 8%; left: 6%; animation-delay: 0s; }
    .sticker:nth-child(2) { bottom: 10%; right: 6%; animation-delay: 0.8s; }
    .sticker:nth-child(3) { top: 12%; right: 10%; animation-delay: 1.6s; font-size: 1.4rem; }

    @keyframes floatSticker {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-8px) rotate(4deg); }
    }

    /* 底部 UI */
    .controls {
      position: absolute;
      bottom: 16px;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      gap: 20px;
      z-index: 10;
    }

    .btn {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      border: 2.5px solid rgba(255,255,255,0.7);
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(6px);
      color: #fff;
      font-size: 1.3rem;
      cursor: pointer;
      transition: all 0.25s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .btn:hover { transform: scale(1.12); background: rgba(255,255,255,0.25); }
    .btn:active { transform: scale(0.92); }

    .btn-capture {
      width: 64px;
      height: 64px;
      border-width: 3px;
      font-size: 1.5rem;
      background: rgba(253, 121, 168, 0.35);
      border-color: #fd79a8;
      box-shadow: 0 0 20px rgba(253,121,168,0.3);
    }
    .btn-capture:hover { box-shadow: 0 0 30px rgba(253,121,168,0.5); }

    /* 顶部标题 */
    .title-bar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      text-align: center;
      padding: 12px 0 8px;
      z-index: 10;
      background: linear-gradient(to bottom, rgba(0,0,0,0.4), transparent);
      border-radius: 20px 20px 0 0;
    }
    .title-bar h2 {
      color: #fff;
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 2px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.5);
    }
    .title-bar h2 span { opacity: 0.7; }

    /* 滤镜提示 */
    .filter-toast {
      position: absolute;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      padding: 6px 18px;
      border-radius: 20px;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(6px);
      color: #fff;
      font-size: 0.85rem;
      letter-spacing: 1px;
      white-space: nowrap;
      opacity: 0;
      transition: opacity 0.35s ease;
      pointer-events: none;
      text-shadow: 0 1px 4px rgba(0,0,0,0.4);
    }
    .filter-toast.show { opacity: 1; }

    /* 拍照闪光 */
    .flash {
      position: absolute;
      inset: 0;
      background: #fff;
      opacity: 0;
      pointer-events: none;
      z-index: 20;
      border-radius: 20px;
      transition: opacity 0.08s;
    }
    .flash.active { opacity: 0.7; }

    /* 截图预览 */
    .preview-overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(8px);
      display: none;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      gap: 20px;
    }
    .preview-overlay.show { display: flex; }

    .preview-overlay img {
      max-width: 80vmin;
      max-height: 60vh;
      border-radius: 16px;
      border: 3px solid rgba(255,255,255,0.3);
      box-shadow: 0 0 40px rgba(162,155,254,0.3);
      transform: scaleX(-1); /* 保持镜子感 */
    }

    .preview-btns {
      display: flex;
      gap: 16px;
    }
    .preview-btns .btn {
      width: auto;
      padding: 0 24px;
      border-radius: 26px;
      font-size: 0.95rem;
    }

    /* 权限提示 */
    .permission-tip {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: rgba(255,255,255,0.6);
      font-size: 0.95rem;
      text-align: center;
      padding: 30px;
      gap: 12px;
      background: rgba(0,0,0,0.5);
      border-radius: 20px;
    }
    .permission-tip .icon { font-size: 3rem; }
  </style>
</head>
<body>

  <!-- 星空 -->
  <div class="stars" id="stars"></div>

  <div class="container">
    <div class="frame">
      <div class="frame-inner">
        <div class="flash" id="flash"></div>

        <!-- 视频 -->
        <video id="mirror-video" autoplay playsinline muted></video>

        <!-- 贴纸 -->
        <div class="sticker">🌸</div>
        <div class="sticker">⭐</div>
        <div class="sticker">🎀</div>

        <!-- 标题 -->
        <div class="title-bar">
          <h2>✦ 魔法镜 <span>·</span> 动漫梳妆 ✦</h2>
        </div>

        <!-- 滤镜名称提示 -->
        <div class="filter-toast" id="filter-toast">✨ 原片</div>

        <!-- 底部按钮 -->
        <div class="controls">
          <button class="btn" id="btn-switch" title="切换摄像头">🔄</button>
          <button class="btn btn-capture" id="btn-capture" title="拍照">📸</button>
          <button class="btn" id="btn-filter" title="滤镜">🎨</button>
        </div>

        <!-- 权限提示 -->
        <div class="permission-tip" id="permission-tip">
          <div class="icon">📷</div>
          <div id="tip-text">请允许使用摄像头<br><small>开启你的魔法镜之旅 ✨</small></div>
          <button class="btn" id="btn-retry" style="width:auto;padding:0 20px;border-radius:20px;font-size:0.85rem;margin-top:6px;">🔄 重试</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 截图预览 -->
  <div class="preview-overlay" id="preview-overlay">
    <img id="preview-img" alt="preview">
    <div class="preview-btns">
      <button class="btn" id="btn-download">💾 保存</button>
      <button class="btn" id="btn-close-preview">✕ 关闭</button>
    </div>
  </div>

  <script>
    // ====== 生成星空 ======
    (function initStars() {
      const container = document.getElementById('stars');
      const count = 100;
      for (let i = 0; i < count; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        const size = 1 + Math.random() * 2.5;
        star.style.width = size + 'px';
        star.style.height = size + 'px';
        star.style.left = Math.random() * 100 + '%';
        star.style.top = Math.random() * 100 + '%';
        star.style.setProperty('--d', (2 + Math.random() * 3) + 's');
        star.style.animationDelay = Math.random() * 3 + 's';
        container.appendChild(star);
      }
    })();

    // ====== 摄像头 ======
    const video = document.getElementById('mirror-video');
    const tip = document.getElementById('permission-tip');
    let currentStream = null;
    let useFront = true; // 默认前置

    async function startCamera(front) {
      if (currentStream) {
        currentStream.getTracks().forEach(t => t.stop());
        await new Promise(r => setTimeout(r, 100));
        currentStream = null;
      }

      // 预热设备列表 (Chrome 需要 enumerateDevices 来"唤醒"摄像头)
      let allDevices = [];
      try {
        allDevices = await navigator.mediaDevices.enumerateDevices();
      } catch (_) {}
      const videoDevices = allDevices.filter(d => d.kind === 'videoinput');

      // 匹配前置/后置摄像头
      const frontKeywords = ['front', 'user', 'face'];
      const backKeywords = ['back', 'environment', 'rear'];
      const target = front
        ? videoDevices.find(d => frontKeywords.some(k => d.label.toLowerCase().includes(k))) || videoDevices[0]
        : videoDevices.find(d => backKeywords.some(k => d.label.toLowerCase().includes(k))) || videoDevices[videoDevices.length - 1];

      const lastError = {};

      const tryStart = async (videoConstraints) => {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: videoConstraints,
          audio: false,
        });
        currentStream = stream;
        video.srcObject = stream;
        tip.style.display = 'none';
        return true;
      };

      // 1) 用 deviceId 精确指定摄像头 (最稳定)
      if (target && target.deviceId) {
        if (await tryStart({ deviceId: { exact: target.deviceId } })
          .catch(() => false)) return;
      }

      // 2) 仅 facingMode，无分辨率
      if (await tryStart({
        facingMode: front ? 'user' : 'environment',
        width: { ideal: 640 },
      }).catch(e => { lastError.name = e.name; lastError.message = e.message; return false; })) return;

      // 3) 任意摄像头
      if (await tryStart(true).catch(() => false)) return;

      tip.style.display = 'flex';
      tip.querySelector('.icon').textContent = '😿';
      tip.querySelector('#tip-text').innerHTML = `摄像头无法访问<br><small>${lastError.name}: ${lastError.message}</small>`;
    }

    // ====== 切换摄像头 ======
    document.getElementById('btn-switch').addEventListener('click', () => {
      useFront = !useFront;
      startCamera(useFront);
    });

    // ====== 重试 ======
    document.getElementById('btn-retry').addEventListener('click', () => {
      startCamera(useFront);
    });

    // ====== 拍照 ======
    const canvas = document.createElement('canvas');
    const flash = document.getElementById('flash');
    const overlay = document.getElementById('preview-overlay');
    const previewImg = document.getElementById('preview-img');

    document.getElementById('btn-capture').addEventListener('click', () => {
      if (!currentStream) return;
      // 闪光
      flash.classList.remove('active');
      void flash.offsetWidth;
      flash.classList.add('active');
      setTimeout(() => flash.classList.remove('active'), 150);

      // 截图
      const w = video.videoWidth || 720;
      const h = video.videoHeight || 960;
      canvas.width = w;
      canvas.height = h;
      const ctx = canvas.getContext('2d');
      // 因为视频是 scaleX(-1) 显示的，canvas 也要镜像
      ctx.translate(w, 0);
      ctx.scale(-1, 1);
      ctx.drawImage(video, 0, 0, w, h);
      previewImg.src = canvas.toDataURL('image/png');
      overlay.classList.add('show');
    });

    document.getElementById('btn-close-preview').addEventListener('click', () => {
      overlay.classList.remove('show');
    });

    document.getElementById('btn-download').addEventListener('click', () => {
      const link = document.createElement('a');
      link.download = 'magic-mirror-' + Date.now() + '.png';
      link.href = previewImg.src;
      link.click();
    });

    // 点击遮罩关闭
    overlay.addEventListener('click', (e) => {
      if (e.target === overlay) overlay.classList.remove('show');
    });

    // ====== 简易滤镜切换 ======
    let filterIndex = 0;
    const filters = [
      { css: 'none', label: '✨ 原片' },
      { css: 'brightness(1.15) saturate(1.2)', label: '🌸 明亮' },
      { css: 'sepia(0.4) hue-rotate(-15deg)', label: '📜 复古' },
      { css: 'saturate(1.6) hue-rotate(320deg)', label: '💜 粉调' },
      { css: 'contrast(1.2) brightness(1.1)', label: '🎨 高对比' },
    ];
    const filterToast = document.getElementById('filter-toast');
    let filterToastTimer = null;

    function showFilterLabel(label) {
      filterToast.textContent = label;
      filterToast.classList.add('show');
      clearTimeout(filterToastTimer);
      filterToastTimer = setTimeout(() => filterToast.classList.remove('show'), 1500);
    }

    document.getElementById('btn-filter').addEventListener('click', () => {
      filterIndex = (filterIndex + 1) % filters.length;
      video.style.filter = filters[filterIndex].css;
      showFilterLabel(filters[filterIndex].label);
    });

    // ====== 启动 ======
    startCamera(true);

    // 键盘快捷键
    document.addEventListener('keydown', (e) => {
      if (e.key === ' ' || e.key === 'Enter') {
        if (overlay.classList.contains('show')) {
          overlay.classList.remove('show');
        } else {
          document.getElementById('btn-capture').click();
        }
        e.preventDefault();
      }
      if (e.key === 'Escape') overlay.classList.remove('show');
    });
  </script>
</body>
</html>
